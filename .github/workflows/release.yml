name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate Release Inputs
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer

      - name: Install dependencies
        run: |
          if [ -f composer.json ]; then
            composer install --no-interaction --prefer-dist
          fi
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          fi

      - name: Validate tag/version consistency
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          node scripts/validate-release.js "${VERSION}"

      - name: Run PHPCS (non-blocking)
        continue-on-error: true
        run: |
          if [ -f vendor/bin/phpcs ]; then
            vendor/bin/phpcs --standard=WordPress --extensions=php includes/ we-spamfighter.php || true
          fi

  build_release:
    name: Build and Publish Release
    needs: validate
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' }}
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install npm dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Read plugin slug
        id: plugin
        run: echo "slug=$(node -p "require('./plugin.config.json').slug")" >> "$GITHUB_OUTPUT"

      - name: Build minified assets
        run: npm run build:assets

      - name: Prepare release notes
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          node scripts/extract-release-notes.js "${VERSION}" release_notes.txt

      - name: Create plugin ZIP
        run: node scripts/build-release-zip.js

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.plugin.outputs.slug }}.zip
          body_path: release_notes.txt
          generate_release_notes: false
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build_zip_preview:
    name: Build ZIP Preview (manual)
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install npm dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Read plugin slug
        id: plugin
        run: echo "slug=$(node -p "require('./plugin.config.json').slug")" >> "$GITHUB_OUTPUT"

      - name: Build minified assets
        run: npm run build:assets

      - name: Create plugin ZIP
        run: node scripts/build-release-zip.js

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.plugin.outputs.slug }}-zip-preview
          path: ${{ steps.plugin.outputs.slug }}.zip
